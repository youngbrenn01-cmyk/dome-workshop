<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - Dome Workshop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">
        <a href="/marketplace">Dome Workshop</a>
      </div>
      <ul class="nav-links">
        <li><a href="/marketplace">Marketplace</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="#" onclick="logout()">Logout</a></li>
      </ul>
    </div>
  </nav>

  <div class="marketplace-container">
    <div class="search-section">
      <h2>Find Items</h2>
      <div class="search-filters">
        <input type="text" id="searchInput" placeholder="Search items..." class="search-bar">
        
        <div class="filter-group">
          <select id="categoryFilter" class="filter-select">
            <option value="">All Categories</option>
            <option value="Electronics">Electronics</option>
            <option value="Art">Art</option>
            <option value="Furniture">Furniture</option>
            <option value="Collectibles">Collectibles</option>
            <option value="Other">Other</option>
          </select>

          <select id="typeFilter" class="filter-select">
            <option value="">All Types</option>
            <option value="Buy">Buy</option>
            <option value="Auction">Auction</option>
            <option value="Trade">Trade</option>
          </select>

          <select id="sortFilter" class="filter-select">
            <option value="newest">Newest</option>
            <option value="price-low">Price: Low to High</option>
            <option value="price-high">Price: High to Low</option>
          </select>

          <button onclick="applyFilters()" class="btn-primary">Search</button>
        </div>
      </div>
    </div>

    <div class="items-section">
      <div class="items-header">
        <h3>Available Items</h3>
        <a href="#" onclick="showCreateItemForm()" class="btn-primary">+ Sell Item</a>
      </div>
      <div id="itemsContainer" class="items-grid"></div>
    </div>

    <div id="messageBox" class="message-box"></div>
  </div>

  <!-- Create Item Modal -->
  <div id="createItemModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeCreateItemForm()">&times;</span>
      <h2>List New Item</h2>
      <form id="createItemForm" onsubmit="createItem(event)">
        <div class="input-group">
          <label for="itemTitle">Title</label>
          <input type="text" id="itemTitle" required>
        </div>
        <div class="input-group">
          <label for="itemDescription">Description</label>
          <textarea id="itemDescription" required></textarea>
        </div>
        <div class="input-group">
          <label for="itemCategory">Category</label>
          <select id="itemCategory" required>
            <option value="Electronics">Electronics</option>
            <option value="Art">Art</option>
            <option value="Furniture">Furniture</option>
            <option value="Collectibles">Collectibles</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="input-group">
          <label for="itemPrice">Price</label>
          <input type="number" id="itemPrice" min="0" step="0.01" required>
        </div>
        <div class="input-group">
          <label for="itemSellerType">Type</label>
          <select id="itemSellerType" required onchange="toggleAuctionTime()">
            <option value="Buy">Buy</option>
            <option value="Auction">Auction</option>
            <option value="Trade">Trade</option>
          </select>
        </div>
        <div class="input-group">
          <label for="itemCondition">Condition</label>
          <select id="itemCondition" required>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
          </select>
        </div>
        <div class="input-group" id="auctionTimeGroup" style="display:none;">
          <label for="itemAuctionEndTime">Auction End Time</label>
          <input type="datetime-local" id="itemAuctionEndTime">
        </div>
        <button type="submit" class="btn-primary">List Item</button>
      </form>
    </div>
  </div>

  <!-- Item Details Modal -->
  <div id="itemDetailsModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeItemDetails()">&times;</span>
      <div id="itemDetailsContent"></div>
    </div>
  </div>

  <script src="marketplace.js"></script>
</body>
</html>
